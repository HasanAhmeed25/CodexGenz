<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CodexGenz website project requirements form." />
  <title>Build My Website | CodexGenz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand">CodexGenz</div>
      <nav class="nav-links">
        <a href="index.html#about">About</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#learning">Learning</a>
        <a href="index.html#testimonials">Testimonials</a>
        <a href="index.html#contact">Contact</a>
      </nav>
      <div class="top-actions">
        <a href="index.html" class="btn btn-secondary">Return Home</a>
      </div>
    </header>

    <main class="section">
      <div class="section-header">
        <p class="eyebrow">Project Requirements</p>
        <h2>Tell us about your website project</h2>
        <p>Fill in the details below so CodexGenz can deliver the right solution for your brand, goal, and budget.</p>
      </div>

      <section class="glass-card requirement-form">
        <form action="mailto:hello@codexgenz.com" method="POST" enctype="text/plain">
          <label>
            Your Name
            <input type="text" name="name" placeholder="Alex Smith" required />
          </label>
          <label>
            Email Address
            <input type="email" name="email" placeholder="alex@domain.com" required />
          </label>
          <label>
            Business / Project Name
            <input type="text" name="project" placeholder="CodexGenz Studios" />
          </label>
          <label>
            Website Type
            <select name="type" required>
              <option value="">Select a type</option>
              <option value="portfolio">Portfolio</option>
              <option value="business">Business</option>
              <option value="ecommerce">E-commerce</option>
              <option value="consulting">Consulting</option>
              <option value="learning">Learning Platform</option>
            </select>
          </label>
          <label>
            Budget Range
            <select name="budget">
              <option value="">Choose a range</option>
              <option value="starter">Starter</option>
              <option value="growth">Growth</option>
              <option value="premium">Premium</option>
            </select>
          </label>
          <label>
            Timeline / Deadline
            <input type="text" name="deadline" placeholder="e.g. 4 weeks" />
          </label>
          <label>
            Key Goals
            <textarea name="goals" rows="5" placeholder="What do you want your website to achieve?" required></textarea>
          </label>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Submit Requirements</button>
            <a href="index.html" class="btn btn-secondary">Back to Home</a>
          </div>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
